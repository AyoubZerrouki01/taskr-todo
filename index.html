<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TASKR — Todo Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --surface2: #eeeee8;
      --border: #d8d8d0;
      --accent: #5a8a00;
      --accent2: #c8a000;
      --accent-glow: rgba(90,138,0,0.12);
      --text: #1a1a16;
      --muted: #999990;
      --danger: #d94040;
      --done: #c8c8c0;
    }

    [data-theme="dark"] {
      --bg: #0a0a08;
      --surface: #111110;
      --surface2: #1a1a18;
      --border: #2a2a26;
      --accent: #c8f060;
      --accent2: #f0c840;
      --accent-glow: rgba(200,240,96,0.08);
      --text: #e8e8e0;
      --muted: #666660;
      --danger: #ff5050;
      --done: #3a3a36;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 120px;
      position: relative;
      overflow-x: hidden;
    }

    /* background grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.6;
    }

    /* accent glow blob */
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: -100px;
      right: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      margin-bottom: 56px;
      animation: fadeDown 0.6s ease both;
    }

    .header-tag {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-tag::before {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--accent);
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(48px, 8vw, 80px);
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    h1 span {
      color: var(--accent);
    }

    .date-line {
      margin-top: 16px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.15em;
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 1px;
      margin-bottom: 40px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .stat {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
      transition: background 0.2s;
    }

    .stat:first-child { border-radius: 12px 0 0 12px; }
    .stat:last-child  { border-radius: 0 12px 12px 0; }

    .stat-value {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* Progress */
    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 999px;
      margin-bottom: 40px;
      overflow: hidden;
      animation: fadeUp 0.6s 0.15s ease both;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 999px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      width: 0%;
    }

    /* Input zone */
    .input-zone {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .task-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px 18px 52px;
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .task-input::placeholder { color: var(--muted); }

    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 18px;
      pointer-events: none;
    }

    .priority-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 16px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
      appearance: none;
      min-width: 90px;
    }

    .priority-select:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 12px;
      padding: 0 24px;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px var(--accent-glow);
    }

    .add-btn:active { transform: translateY(0); }

    /* Filter tabs */
    .filters {
      display: flex;
      gap: 4px;
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.25s ease both;
    }

    .filter-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 7px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--border); }
    .filter-btn.active {
      background: var(--surface2);
      color: var(--accent);
      border-color: var(--border);
    }

    /* Category input */
    .category-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text);
      outline: none;
      width: 130px;
      margin-left: auto;
      transition: border-color 0.2s;
    }

    .category-input::placeholder { color: var(--muted); }
    .category-input:focus { border-color: var(--accent); }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 12px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Task item */
    .task-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      animation: slideIn 0.3s ease both;
      position: relative;
      overflow: hidden;
    }

    .task-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--priority-color, var(--border));
      border-radius: 999px;
    }

    .task-item:hover {
      border-color: var(--border);
      background: var(--surface2);
      transform: translateX(4px);
    }

    .task-item.done {
      opacity: 0.5;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Checkbox */
    .checkbox {
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }

    .checkbox:hover { border-color: var(--accent); }

    .checkbox.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox.checked::after {
      content: '';
      width: 5px;
      height: 9px;
      border: 1.5px solid #0a0a08;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    /* Task content */
    .task-content {
      flex: 1;
      min-width: 0;
    }

    .task-text {
      font-size: 14px;
      color: var(--text);
      transition: color 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .task-category {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .task-time {
      font-size: 10px;
      color: var(--muted);
    }

    /* Priority badge */
    .priority-badge {
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 500;
    }

    .p-high   { background: rgba(255,80,80,0.15);  color: #ff7070; --priority-color: #ff5050; }
    .p-medium { background: rgba(240,200,64,0.15); color: #f0c840; --priority-color: #f0c840; }
    .p-low    { background: rgba(200,240,96,0.15); color: #c8f060; --priority-color: #c8f060; }

    /* Actions */
    .task-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions { opacity: 1; }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      width: 30px;
      height: 30px;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .action-btn:hover { border-color: var(--danger); color: var(--danger); }
    .action-btn.edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Footer */
    footer {
      margin-top: 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      animation: fadeUp 0.6s 0.35s ease both;
    }

    .clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.1em;
    }

    .clear-btn:hover { border-color: var(--danger); color: var(--danger); }

    /* Edit inline */
    .task-edit-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--accent);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      outline: none;
      width: 100%;
      padding: 2px 0;
    }

    /* Theme switch */
    .theme-switch {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      user-select: none;
    }

    .theme-switch-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .switch-track {
      width: 44px;
      height: 24px;
      background: var(--border);
      border-radius: 999px;
      position: relative;
      transition: background 0.3s;
      border: 1px solid var(--border);
    }

    .switch-track.on { background: var(--accent); }

    .switch-thumb {
      width: 18px;
      height: 18px;
      background: var(--surface);
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .switch-track.on .switch-thumb { transform: translateX(20px); }

    .switch-icon { font-size: 14px; }

    /* Animations */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .pop { animation: pop 0.25s ease; }

    /* Drag & drop */
    .task-item.dragging {
      opacity: 0.4;
      border-style: dashed;
    }

    .task-item.drag-over {
      border-color: var(--accent);
      background: rgba(200,240,96,0.04);
    }

    /* Drag handle */
    .drag-handle {
      color: var(--muted);
      cursor: grab;
      font-size: 14px;
      padding: 0 2px;
      user-select: none;
    }

    .drag-handle:active { cursor: grabbing; }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
      <div>
        <div class="header-tag">Productivity Suite</div>
        <h1>TASK<span>R</span></h1>
        <div class="date-line" id="date-line">—</div>
      </div>
      <div class="theme-switch" id="theme-switch" title="Changer le thème">
        <span class="switch-icon">☀️</span>
        <div class="switch-track" id="switch-track">
          <div class="switch-thumb"></div>
        </div>
        <span class="switch-icon">🌙</span>
      </div>
    </div>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-active">0</div>
      <div class="stat-label">Actives</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-done">0</div>
      <div class="stat-label">Faites</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="stat-pct">0%</div>
      <div class="stat-label">Complété</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill"></div>
  </div>

  <div class="input-zone">
    <div class="input-wrap">
      <span class="input-icon">+</span>
      <input class="task-input" id="task-input" type="text" placeholder="Nouvelle tâche..." autocomplete="off"/>
    </div>
    <select class="priority-select" id="priority-select">
      <option value="low" selected>🟢 Basse</option>
      <option value="medium">🟡 Moyenne</option>
      <option value="high">🔴 Haute</option>
    </select>
    <button class="add-btn" id="add-btn">Ajouter</button>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">Toutes</button>
    <button class="filter-btn" data-filter="active">Actives</button>
    <button class="filter-btn" data-filter="done">Faites</button>
    <button class="filter-btn" data-filter="high">🔴 Haute</button>
    <input class="category-input" id="cat-input" type="text" placeholder="# catégorie..." />
  </div>

  <div class="task-list" id="task-list"></div>

  <footer>
    <span id="footer-info">0 tâche restante</span>
    <button class="clear-btn" id="clear-done">Supprimer les faites</button>
  </footer>

</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('taskr_tasks') || '[]');
  let filter = 'all';
  let catFilter = '';
  let dragSrc = null;

  // ── Init ───────────────────────────────────────────────────────────────────
  const days = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const months = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  const now = new Date();
  document.getElementById('date-line').textContent =
    `— ${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;

  // ── Save ───────────────────────────────────────────────────────────────────
  function save() {
    localStorage.setItem('taskr_tasks', JSON.stringify(tasks));
  }

  // ── Add ────────────────────────────────────────────────────────────────────
  function addTask() {
    const input = document.getElementById('task-input');
    const priority = document.getElementById('priority-select').value;
    const catInput = document.getElementById('cat-input');
    const text = input.value.trim();
    if (!text) { input.focus(); return; }

    const cat = catInput.value.trim().replace(/^#\s*/, '') || 'général';
    tasks.unshift({
      id: Date.now(),
      text,
      priority,
      category: cat,
      done: false,
      createdAt: Date.now()
    });
    input.value = '';
    save();
    render();
    input.focus();
  }

  document.getElementById('add-btn').addEventListener('click', addTask);
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── Toggle ─────────────────────────────────────────────────────────────────
  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  // ── Delete ─────────────────────────────────────────────────────────────────
  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save();
    render();
  }

  // ── Edit ───────────────────────────────────────────────────────────────────
  function startEdit(id, el) {
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    const span = el.querySelector('.task-text');
    const input = document.createElement('input');
    input.className = 'task-edit-input';
    input.value = t.text;
    span.replaceWith(input);
    input.focus();
    const done = () => {
      const v = input.value.trim();
      if (v) t.text = v;
      save();
      render();
    };
    input.addEventListener('blur', done);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') input.blur();
      if (e.key === 'Escape') { render(); }
    });
  }

  // ── Filters ────────────────────────────────────────────────────────────────
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  document.getElementById('cat-input').addEventListener('input', e => {
    catFilter = e.target.value.trim().replace(/^#\s*/, '').toLowerCase();
    render();
  });

  document.getElementById('clear-done').addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done);
    save();
    render();
  });

  // ── Drag & Drop ────────────────────────────────────────────────────────────
  function setupDrag(el, id) {
    el.draggable = true;
    el.addEventListener('dragstart', () => {
      dragSrc = id;
      setTimeout(() => el.classList.add('dragging'), 0);
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('dragging');
      document.querySelectorAll('.task-item').forEach(i => i.classList.remove('drag-over'));
    });
    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.classList.add('drag-over');
    });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => {
      e.preventDefault();
      el.classList.remove('drag-over');
      if (dragSrc === id) return;
      const fromIdx = tasks.findIndex(t => t.id === dragSrc);
      const toIdx   = tasks.findIndex(t => t.id === id);
      if (fromIdx === -1 || toIdx === -1) return;
      const [moved] = tasks.splice(fromIdx, 1);
      tasks.splice(toIdx, 0, moved);
      save();
      render();
    });
  }

  // ── Render ─────────────────────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('task-list');

    let visible = tasks.filter(t => {
      if (filter === 'active' && t.done) return false;
      if (filter === 'done'   && !t.done) return false;
      if (filter === 'high'   && t.priority !== 'high') return false;
      if (catFilter && t.category.toLowerCase() !== catFilter) return false;
      return true;
    });

    // Stats
    const total = tasks.length;
    const done  = tasks.filter(t => t.done).length;
    const active = total - done;
    const pct   = total ? Math.round(done / total * 100) : 0;
    document.getElementById('stat-total').textContent  = total;
    document.getElementById('stat-active').textContent = active;
    document.getElementById('stat-done').textContent   = done;
    document.getElementById('stat-pct').textContent    = pct + '%';
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('footer-info').textContent =
      active === 0 ? '✓ tout est fait !' : `${active} tâche${active > 1 ? 's' : ''} restante${active > 1 ? 's' : ''}`;

    // Empty state
    if (visible.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="empty-icon">○</div>
        <p>Aucune tâche ici</p>
      </div>`;
      return;
    }

    list.innerHTML = '';

    visible.forEach(t => {
      const pClass = `p-${t.priority}`;
      const pLabel = t.priority === 'high' ? 'Haute' : t.priority === 'medium' ? 'Moyenne' : 'Basse';
      const timeAgo = formatTime(t.createdAt);

      const item = document.createElement('div');
      item.className = `task-item ${t.done ? 'done' : ''} ${pClass}`;
      item.dataset.id = t.id;
      item.innerHTML = `
        <span class="drag-handle" title="Glisser">⠿</span>
        <div class="checkbox ${t.done ? 'checked' : ''}" data-action="toggle"></div>
        <div class="task-content">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="task-category">#${escHtml(t.category)}</span>
            <span class="task-time">${timeAgo}</span>
          </div>
        </div>
        <span class="priority-badge ${pClass}">${pLabel}</span>
        <div class="task-actions">
          <button class="action-btn edit-btn" data-action="edit" title="Modifier">✎</button>
          <button class="action-btn" data-action="delete" title="Supprimer">✕</button>
        </div>
      `;

      item.addEventListener('click', e => {
        const action = e.target.closest('[data-action]')?.dataset.action;
        if (action === 'toggle') {
          const cb = item.querySelector('.checkbox');
          cb.classList.add('pop');
          setTimeout(() => cb.classList.remove('pop'), 250);
          toggleTask(t.id);
        }
        if (action === 'delete') deleteTask(t.id);
        if (action === 'edit')   startEdit(t.id, item);
      });

      setupDrag(item, t.id);
      list.appendChild(item);
    });
  }

  // ── Helpers ────────────────────────────────────────────────────────────────
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatTime(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1)  return 'à l\'instant';
    if (m < 60) return `il y a ${m}m`;
    const h = Math.floor(m / 60);
    if (h < 24) return `il y a ${h}h`;
    return `il y a ${Math.floor(h/24)}j`;
  }

  // ── Theme switch ───────────────────────────────────────────────────────────
  let isDark = localStorage.getItem('taskr_theme') === 'dark';

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
    document.getElementById('switch-track').classList.toggle('on', isDark);
  }

  document.getElementById('theme-switch').addEventListener('click', () => {
    isDark = !isDark;
    localStorage.setItem('taskr_theme', isDark ? 'dark' : 'light');
    applyTheme();
  });

  applyTheme();

  // ── Boot ───────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
